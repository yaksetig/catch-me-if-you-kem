name = "RequestProject"
defaultTargets = ["RequestProject", "ChannelEstablishment"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "RequestProject"
globs = ["RequestProject.+"]

[[lean_lib]]
name = "ChannelEstablishment"
globs = ["ChannelEstablishment", "ChannelEstablishment.+"]
